name: CI Pipeline

on:
  push:
    branches: [ main, master, homework11 ]
  pull_request:
    branches: [ master, homework11 ]
  workflow_dispatch:  

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true  

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: "file:./dev.db"
          JWT_SECRET: "test-secret-key"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: quiz-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
